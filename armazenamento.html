<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD & LM | OPERAÇÕES</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #CF035C; --bg: #f5f5f5; --card: #ffffff; --text: #333; --success: #27ae60; --info: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 500px; margin: auto; }

        .op-card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid #ddd; }
        .card-armazenar { border-top-color: var(--primary); }
        .card-expedir { border-top-color: var(--info); }

        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .card-armazenar .card-header { color: var(--primary); }
        .card-expedir .card-header { color: var(--info); }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; 
            box-sizing: border-box; outline: none; background: #fafafa; transition: 0.3s;
        }
        .input-group input:focus { border-color: inherit; background: #fff; }

        .btn-confirm { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-arm { background: var(--primary); }
        .btn-exp { background: var(--info); }
        .btn-confirm:active { transform: scale(0.98); }

        /* Modal Doca */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 20% auto; padding: 25px; border-radius: 15px; width: 80%; max-width: 320px; text-align: center; }
        select { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; font-size: 16px; border: 2px solid #ddd; }
    </style>
</head>
<body>

<header>
    <span class="material-icons" style="cursor:pointer" onclick="window.location.href='main.html'">arrow_back</span>
    <span style="font-weight: bold;">MOVIMENTAÇÃO DE CARGA</span>
</header>

<div class="container">
    
    <div class="op-card card-armazenar">
        <div class="card-header"><i class="material-icons">save_alt</i> 1. Armazenar no Estoque</div>
        <div class="input-group">
            <label>PALLET (PLT)</label>
            <input type="text" id="arm-plt" placeholder="Bipe o Pallet..." autocomplete="off">
        </div>
        <div class="input-group">
            <label>ENDEREÇO / POSIÇÃO</label>
            <input type="text" id="arm-pos" placeholder="Bipe a Posição..." autocomplete="off">
        </div>
        <button class="btn-confirm btn-arm" onclick="executarArmazenamento()">REGISTRAR POSIÇÃO</button>
    </div>

    <div class="op-card card-expedir">
        <div class="card-header"><i class="material-icons">local_shipping</i> 2. Expedir / Carregamento</div>
        <div class="input-group">
            <label>PALLET (PLT)</label>
            <input type="text" id="exp-plt" placeholder="Bipe o Pallet para saída..." autocomplete="off">
        </div>
        <button class="btn-confirm btn-exp" onclick="abrirModalDoca()">SELECIONAR DOCA E FINALIZAR</button>
    </div>

</div>

<div id="modalDoca" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--info)">DOCA DE SAÍDA</h3>
        <select id="select-doca">
            <option value="Doca 19">Doca 19</option>
            <option value="Doca 20">Doca 20</option>
            <option value="Doca 21">Doca 21</option>
            <option value="Doca 22">Doca 22</option>
        </select>
        <button class="btn-confirm btn-exp" onclick="executarExpedicao()">CONFIRMAR SAÍDA</button>
        <p style="margin-top:10px; color:#999; font-size:12px; cursor:pointer" onclick="document.getElementById('modalDoca').style.display='none'">Voltar</p>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:8000";

    // Atalho Enter para Armazenamento
    document.getElementById('arm-plt').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('arm-pos').focus(); });
    document.getElementById('arm-pos').addEventListener('keypress', (e) => { if(e.key === 'Enter') executarArmazenamento(); });

    // Atalho Enter para Expedição
    document.getElementById('exp-plt').addEventListener('keypress', (e) => { if(e.key === 'Enter') abrirModalDoca(); });

    async function executarArmazenamento() {
        const plt = document.getElementById('arm-plt').value;
        const pos = document.getElementById('arm-pos').value;
        if(!plt || !pos) return alert("Preencha Pallet e Posição!");

        try {
            const res = await fetch(`${API}/armazenar-pallet`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id_pallet: plt, endereco: pos })
            });
            if(res.ok) {
                alert("Pallet " + plt + " endereçado!");
                document.getElementById('arm-plt').value = "";
                document.getElementById('arm-pos').value = "";
                document.getElementById('arm-plt').focus();
            }
        } catch(e) { alert("Erro ao conectar na API"); }
    }

    function abrirModalDoca() {
        if(!document.getElementById('exp-plt').value) return alert("Bipe o Pallet primeiro!");
        document.getElementById('modalDoca').style.display = 'block';
    }

    async function executarExpedicao() {
        const plt = document.getElementById('exp-plt').value;
        const doca = document.getElementById('select-doca').value;

        try {
            const res = await fetch(`${API}/expedir-pallet`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id_pallet: plt, doca: doca })
            });
            if(res.ok) {
                alert("Pallet " + plt + " expedido com sucesso!");
                location.reload();
            }
        } catch(e) { alert("Erro na expedição"); }
    }
</script>
</body>
</html>
